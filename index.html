<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="stylesheet.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="game">
    <h1>Rock Paper Scissors</h1><br>
    <div class="play-buttons">
    <button class="rock-btn"
     id="rock-button"><img class="rock-img"src="images/rock.jpg"></button>
    <button class="paper-btn"
    id="paper-button"><img class="paper-img"
        src="images/paper.png"></button>
    <button class="scissors-btn"
     id="scissors-button"><img class="scissors-img"
        src="images/scissors.png"></button>
    </div>
    <div class="game-stat">
    <p id="scores1"></p><br>
    <p id="scores2"></p><br>
    <p id="scores3"></p><br>
    <p id="result"></p><br>
    </div>
    
    </div>
    



    
</body>

</html>
